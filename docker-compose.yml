version: '3.8'

services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - freqtrade_data:/freqtrade/user_data
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        mkdir -p /freqtrade/user_data/strategies /freqtrade/user_data/logs /freqtrade/user_data/data

        cat > /freqtrade/user_data/config.json << 'CONF'
        {
          "trading_mode": "futures",
          "margin_mode": "isolated",
          "max_open_trades": 3,
          "stake_currency": "USDT",
          "stake_amount": "unlimited",
          "tradable_balance_ratio": 0.99,
          "fiat_display_currency": "USD",
          "dry_run": true,
          "dry_run_wallet": 1000,
          "cancel_open_orders_on_exit": true,
          "exchange": {
            "name": "kucoin",
            "key": "TU_API_KEY",
            "secret": "TU_SECRET",
            "password": "TU_PASSPHRASE",
            "ccxt_config": { "enableRateLimit": true },
            "ccxt_async_config": { "enableRateLimit": true },
            "pair_whitelist": ["BTC/USDT:USDT", "ETH/USDT:USDT", "SOL/USDT:USDT"],
            "pair_blacklist": []
          },
          "entry_pricing": {
            "price_side": "same",
            "use_order_book": true,
            "order_book_top": 1,
            "price_last_balance": 0.0,
            "check_depth_of_market": { "enabled": false }
          },
          "exit_pricing": {
            "price_side": "same",
            "use_order_book": true,
            "order_book_top": 1
          },
          "stoploss": -0.05,
          "trailing_stop": false,
          "minimal_roi": { "0": 0.08, "60": 0.05, "120": 0.03 },
          "timeframe": "1h",
          "order_types": {
            "entry": "limit", "exit": "limit",
            "stoploss": "market", "stoploss_on_exchange": true,
            "stoploss_on_exchange_interval": 60
          },
          "order_time_in_force": { "entry": "GTC", "exit": "GTC" },
          "pairlists": [{ "method": "StaticPairList" }],
          "telegram": { "enabled": false },
          "api_server": {
            "enabled": true,
            "listen_ip_address": "0.0.0.0",
            "listen_port": 8080,
            "verbosity": "error",
            "enable_openapi": false,
            "jwt_secret_key": "safira-jwt-secret-cambia-esto",
            "ws_token": "safira-ws-token",
            "CORS_origins": [],
            "username": "safira",
            "password": "safira2024"
          },
          "bot_name": "SAFIRA",
          "initial_state": "running",
          "internals": { "process_throttle_secs": 5 }
        }
        CONF

        cp /freqtrade/user_data/strategies/SafiraStrategy.py /freqtrade/user_data/strategies/SafiraStrategy.py 2>/dev/null || true

        echo "Config creado. Iniciando bot..."
        exec freqtrade trade \
          --logfile /freqtrade/user_data/logs/freqtrade.log \
          --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite \
          --config /freqtrade/user_data/config.json \
          --strategy SafiraStrategy

volumes:
  freqtrade_data:
